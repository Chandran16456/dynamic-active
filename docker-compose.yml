services:
  postgres:
    image: postgres:16
    container_name: dynamic_active_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: dynamic_user
      POSTGRES_PASSWORD: rudra_123
      POSTGRES_DB: dynamic_active_db
    ports:
      - "5433:5432"
    volumes:
      - dynamic_active_postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    container_name: dynamic_active_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://dynamic_user:rudra_123@postgres:5432/dynamic_active_db
      SECRET_KEY: dynamic_active_secret_change_later
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 120
      GROQ_API_KEY: ${GROQ_API_KEY}
      GROQ_MODEL: llama-3.1-8b-instant
      ENABLE_SCHEDULER: "true"
      FRONTEND_URL: http://localhost:5173
    ports:
      - "8000:8000"
    depends_on:
      - postgres

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:8000
    container_name: dynamic_active_frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  dynamic_active_postgres_data:
  